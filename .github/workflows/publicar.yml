name: Duna Press — Publicacao Automatica IA
on:
  schedule:
    - cron: '0 9 * * *'    # 06:00 BRT
    - cron: '0 12 * * *'   # 09:00 BRT
    - cron: '0 15 * * *'   # 12:00 BRT
    - cron: '0 18 * * *'   # 15:00 BRT
    - cron: '0 21 * * *'   # 18:00 BRT
    - cron: '0 0 * * *'    # 21:00 BRT
  workflow_dispatch:
    inputs:
      modo:
        description: 'todos | gastos'
        required: true
        default: 'todos'
        type: choice
        options: [todos, gastos]
jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Publicar artigo da hora
        run: |
          HORA=$(date -u +%H)
          if [ "$HORA" = "09" ]; then CAT="tecnologia"
          elif [ "$HORA" = "12" ]; then CAT="economia"
          elif [ "$HORA" = "15" ]; then CAT="ciencia"
          elif [ "$HORA" = "18" ]; then CAT="geopolitica"
          elif [ "$HORA" = "21" ]; then CAT="saude"
          elif [ "$HORA" = "00" ]; then CAT="ambiente"
          else CAT="${{ github.event.inputs.modo || 'todos' }}"
          fi
          python auto_publicar.py $CAT
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "Duna Press Bot"
          git config user.email "bot@dunapress.org"
          git add artigos/ || true
          git diff --staged --quiet || git commit -m "auto: $(date +'%Y-%m-%d %H:%M')"
          git push
