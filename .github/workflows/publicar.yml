name: Duna Press - Publicacao Automatica IA
on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 Brasil (BRT)
    - cron: '0 11 * * *'   # 08:00 Brasil
    - cron: '0 12 * * *'   # 09:00 Brasil
    - cron: '0 13 * * *'   # 10:00 Brasil
    - cron: '0 14 * * *'   # 11:00 Brasil
    - cron: '0 15 * * *'   # 12:00 Brasil
  workflow_dispatch:
    inputs:
      modo:
        description: >
          agendado | gastos | agenda | todos |
          SEGUNDA: health, saude-mental, psicologia, personal-development, space-exploration, ufologia |
          TERCA: technology, inteligencia-artificial, science, innovation, astronomy, energias-renovaveis |
          QUARTA: global-economy, economia-brasileira, finances, financial-education, entrepreneurship, criptomoedas |
          QUINTA: geopolitics, geopolitica-brasil, international-affairs, guerra-e-conflitos, politics-and-society, military |
          SEXTA: culture-and-history, history, arqueologia, literature, philosophy, education |
          SABADO: soccer, sports, tennis, formula-1, cycling, olympic-games |
          DOMINGO: environment, agriculture, gastronomia, tourism-and-gastronomy, lifestyle, pets
        required: false
        default: 'agendado'
        type: string
permissions:
  contents: write
jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Publicar artigo da hora
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          UNSPLASH_KEY:  ${{ secrets.UNSPLASH_KEY }}
          RESEND_KEY:    ${{ secrets.RESEND_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          NEWSAPI_KEY:   ${{ secrets.NEWSAPI_KEY }}
          SCHEDULE:      ${{ github.event.schedule }}
        run: |
          MODO="${{ github.event.inputs.modo }}"
          if [ -z "$MODO" ]; then MODO="agendado"; fi
          echo "Modo: $MODO"
          echo "Schedule: ${SCHEDULE:-manual/dispatch}"
          python auto_publicar.py $MODO
      - name: Regenerar articles-cards.json
        run: python scripts/gerar_cards_index.py
      - name: Commit e push dos rascunhos
        run: |
          git config user.name  "Duna Press Bot"
          git config user.email "bot@dunapress.org"
          git add artigos/ search-index.json articles-cards.json
          git diff --cached --quiet || git commit -m "draft: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
