name: Duna Press - Publicacao Automatica IA
on:
  schedule:
    - cron: '0 9  * * *'   # 09:00 UTC
    - cron: '0 12 * * *'   # 12:00 UTC
    - cron: '0 15 * * *'   # 15:00 UTC
    - cron: '0 18 * * *'   # 18:00 UTC
    - cron: '0 21 * * *'   # 21:00 UTC
    - cron: '0 0  * * *'   # 00:00 UTC
  workflow_dispatch:
    inputs:
      modo:
        description: >
          agendado | gastos | agenda | todos |
          ou slug: health, well-being, fitness, personal-development, motivational, beauty,
          technology, science, innovation, future-and-innovation, astronomy, e-auto,
          global-economy, business-and-economy, finances, financial-education, entrepreneurship, courses-and-careers,
          geopolitics, politics-and-society, international-affairs, military, world-affairs, global-affairs,
          culture-and-history, history, literature, music, philosophy, education,
          soccer, sports, tennis, formula-1, cycling, olympic-games,
          environment, agriculture, tourism-and-gastronomy, fashion, lifestyle, pets
        required: false
        default: 'agendado'
        type: string
permissions:
  contents: write
jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Publicar artigo da hora
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          UNSPLASH_KEY:  ${{ secrets.UNSPLASH_KEY }}
          # NOVO: passa o cron que disparou para o Python identificar o slot sem depender do relogio
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          MODO="${{ github.event.inputs.modo }}"
          if [ -z "$MODO" ]; then MODO="agendado"; fi
          echo "Modo: $MODO"
          echo "Schedule: ${SCHEDULE:-manual/dispatch}"
          python auto_publicar.py $MODO
      - name: Commit e push dos rascunhos
        run: |
          git config user.name  "Duna Press Bot"
          git config user.email "bot@dunapress.org"
          git add artigos/ search-index.json
          git diff --cached --quiet || git commit -m "draft: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
