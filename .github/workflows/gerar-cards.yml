name: Gerar articles-cards.json

on:
  push:
    paths:
      - 'artigos/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rodar script
        run: python scripts/gerar_cards_index.py

      - name: Commit articles-cards.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articles-cards.json
          git diff --staged --quiet || git commit -m "auto: regenera articles-cards.json"
          git pull --rebase
          git push
