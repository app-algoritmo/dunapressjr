<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duna Press — Painel Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rust: #c94d3a; --rust-dark: #a83e32; --rust-light: #e06552;
            --bg: #0f0f0f; --bg2: #161616; --bg3: #1e1e1e; --bg4: #252525;
            --border: rgba(255,255,255,0.07); --border-rust: rgba(201,77,58,0.3);
            --text: #e8e8e8; --text-dim: #888; --text-dimmer: #555;
            --success: #22c55e; --warning: #f59e0b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
        #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse at 30% 50%, rgba(168,62,50,0.12) 0%, transparent 60%), radial-gradient(ellipse at 70% 20%, rgba(201,77,58,0.06) 0%, transparent 50%), var(--bg); }
        .login-box { width:100%; max-width:400px; padding:48px 40px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; box-shadow:0 32px 80px rgba(0,0,0,0.6); }
        .login-logo { display:flex; align-items:center; gap:12px; margin-bottom:36px; }
        .login-logo-mark { width:44px; height:44px; border-radius:10px; background:linear-gradient(135deg,var(--rust),var(--rust-dark)); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:#fff; box-shadow:0 4px 20px rgba(201,77,58,0.4); }
        .login-logo-text h1 { font-family:'Playfair Display',serif; font-size:20px; color:#fff; }
        .login-logo-text p { font-size:11px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
        .login-tabs { display:flex; margin-bottom:24px; border-bottom:1px solid var(--border); }
        .login-tab { flex:1; padding:10px; background:none; border:none; color:var(--text-dim); font-size:13px; font-weight:700; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; font-family:'Lato',sans-serif; }
        .login-tab.active { color:var(--rust-light); border-bottom-color:var(--rust); }
        .field { margin-bottom:16px; }
        .field label { display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px; }
        .field input { width:100%; padding:12px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; font-family:'Lato',sans-serif; transition:border-color .2s, box-shadow .2s; outline:none; }
        .field input:focus { border-color:var(--rust); box-shadow:0 0 0 3px rgba(201,77,58,0.12); }
        .btn-primary { width:100%; padding:13px; margin-top:8px; background:linear-gradient(135deg,var(--rust),var(--rust-dark)); border:none; border-radius:8px; color:#fff; font-family:'Lato',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; letter-spacing:.5px; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(201,77,58,0.4); }
        .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
        .login-msg { margin-top:14px; padding:10px 14px; border-radius:6px; font-size:13px; display:none; }
        .login-msg.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#f87171; }
        .login-msg.success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.2); color:#4ade80; }
        .login-msg.info { background:rgba(201,77,58,0.1); border:1px solid rgba(201,77,58,0.2); color:var(--rust-light); }
        #adminScreen { display:none; min-height:100vh; }
        .admin-header { height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .admin-header-left { display:flex; align-items:center; gap:12px; }
        .admin-logo-mark { width:32px; height:32px; border-radius:7px; background:linear-gradient(135deg,var(--rust),var(--rust-dark)); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#fff; }
        .admin-header-left span { font-family:'Playfair Display',serif; font-size:16px; color:#fff; }
        .admin-header-left small { font-size:11px; color:var(--text-dim); margin-left:6px; letter-spacing:1px; text-transform:uppercase; }
        .admin-header-right { display:flex; align-items:center; gap:12px; }
        .user-chip { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:20px; font-size:13px; color:var(--text-dim); }
        .user-dot { width:7px; height:7px; border-radius:50%; background:var(--success); }
        .btn-logout { padding:6px 14px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-dim); font-size:12px; cursor:pointer; transition:all .2s; }
        .btn-logout:hover { border-color:var(--rust); color:var(--rust-light); }
        .admin-tabs { display:flex; gap:2px; padding:0 24px; background:var(--bg2); border-bottom:1px solid var(--border); }
        .tab-btn { padding:12px 20px; font-size:13px; font-weight:700; color:var(--text-dim); background:none; border:none; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; letter-spacing:.3px; }
        .tab-btn:hover { color:var(--text); }
        .tab-btn.active { color:var(--rust-light); border-bottom-color:var(--rust); }
        .admin-content { padding:28px 24px; max-width:1100px; margin:0 auto; }
        .editor-layout { display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start; }
        @media(max-width:900px){ .editor-layout{ grid-template-columns:1fr; } }
        .editor-main { background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        .editor-sidebar { display:flex; flex-direction:column; gap:16px; }
        .title-input { width:100%; padding:20px 24px; background:transparent; border:none; border-bottom:1px solid var(--border); color:#fff; font-family:'Playfair Display',serif; font-size:26px; outline:none; transition:border-color .2s; }
        .title-input::placeholder { color:var(--text-dimmer); }
        .title-input:focus { border-bottom-color:var(--rust); }
        .toolbar { display:flex; flex-wrap:wrap; gap:4px; padding:10px 16px; background:var(--bg3); border-bottom:1px solid var(--border); }
        .toolbar-group { display:flex; gap:2px; margin-right:8px; padding-right:8px; border-right:1px solid var(--border); }
        .toolbar-group:last-child { border-right:none; margin-right:0; }
        .tb-btn { padding:6px 10px; background:transparent; border:none; border-radius:5px; color:var(--text-dim); cursor:pointer; font-size:13px; font-weight:700; transition:all .15s; min-width:30px; display:flex; align-items:center; justify-content:center; }
        .tb-btn:hover { background:var(--bg4); color:var(--text); }
        .editor-mode-tabs { display:flex; border-bottom:1px solid var(--border); }
        .editor-mode-tab { padding:8px 18px; font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; background:none; border:none; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
        .editor-mode-tab.active { color:var(--rust-light); border-bottom-color:var(--rust); }
        .editor-area { width:100%; min-height:420px; padding:20px 24px; background:transparent; border:none; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; line-height:1.8; resize:vertical; outline:none; }
        .editor-area::placeholder { color:var(--text-dimmer); }
        .preview-area { min-height:420px; padding:20px 24px; display:none; font-family:'Lato',sans-serif; font-size:15px; line-height:1.8; color:#cbd5e1; }
        .preview-area h1,.preview-area h2,.preview-area h3 { font-family:'Playfair Display',serif; color:#f1f5f9; margin:1.5rem 0 .8rem; }
        .preview-area h2 { font-size:1.4rem; border-bottom:1px solid rgba(201,77,58,0.3); padding-bottom:.4rem; }
        .preview-area p { margin-bottom:1.2rem; }
        .preview-area strong { color:#f1f5f9; }
        .preview-area blockquote { border-left:3px solid var(--rust); padding:.8rem 1.2rem; background:rgba(201,77,58,0.06); border-radius:0 6px 6px 0; margin:1rem 0; color:#94a3b8; font-style:italic; }
        .preview-area ul,.preview-area ol { margin:.8rem 0 1rem 1.5rem; }
        .preview-area li { margin-bottom:.4rem; }
        .preview-area hr { border:none; border-top:1px solid var(--border); margin:1.5rem 0; }
        .preview-area img { max-width:100%; border-radius:8px; margin:1rem 0; }
        .preview-area .video-embed { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:8px; margin:1rem 0; background:#000; }
        .preview-area .video-embed iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
        .sidebar-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:18px; }
        .sidebar-card h3 { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:14px; }
        .sidebar-field { margin-bottom:12px; }
        .sidebar-field label { display:block; font-size:11px; color:var(--text-dim); margin-bottom:6px; }
        .sidebar-field input,.sidebar-field select { width:100%; padding:9px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; font-family:'Lato',sans-serif; outline:none; transition:border-color .2s; }
        .sidebar-field input:focus,.sidebar-field select:focus { border-color:var(--rust); }
        .sidebar-field select { cursor:pointer; }
        .status-row { display:flex; gap:8px; }
        .status-opt { flex:1; padding:8px; border:1px solid var(--border); border-radius:6px; text-align:center; font-size:12px; font-weight:700; cursor:pointer; transition:all .2s; }
        .status-opt:hover { border-color:var(--rust); }
        .status-opt.active { background:rgba(201,77,58,0.15); border-color:var(--rust); color:var(--rust-light); }
        .btn-publish { width:100%; padding:14px; background:linear-gradient(135deg,var(--rust),var(--rust-dark)); border:none; border-radius:8px; color:#fff; font-family:'Lato',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; letter-spacing:.5px; }
        .btn-publish:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(201,77,58,0.4); }
        .btn-publish:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
        .btn-draft { width:100%; padding:10px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-dim); font-size:13px; cursor:pointer; transition:all .2s; margin-top:8px; }
        .btn-draft:hover { border-color:var(--rust); color:var(--rust-light); }
        .slug-preview { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dimmer); margin-top:6px; word-break:break-all; }
        .articles-header { display:flex; align-items:center; margin-bottom:20px; gap:12px; }
        .articles-header h2 { font-family:'Playfair Display',serif; font-size:22px; color:#fff; flex:1; }
        .search-input { padding:9px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; width:240px; outline:none; transition:border-color .2s; }
        .search-input:focus { border-color:var(--rust); }
        .btn-new { padding:9px 18px; background:linear-gradient(135deg,var(--rust),var(--rust-dark)); border:none; border-radius:8px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; }
        .btn-new:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,77,58,0.35); }
        .articles-table { width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        .table-head { display:grid; grid-template-columns:1fr 160px 120px 90px 100px; padding:12px 20px; background:var(--bg3); border-bottom:1px solid var(--border); font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-dimmer); }
        .table-row { display:grid; grid-template-columns:1fr 160px 120px 90px 100px; padding:14px 20px; border-bottom:1px solid var(--border); align-items:center; transition:background .15s; }
        .table-row:last-child { border-bottom:none; }
        .table-row:hover { background:var(--bg3); }
        .table-row-title { font-size:14px; color:#fff; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:16px; }
        .cat-pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#fff; }
        .table-row-date { font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
        .table-row-status span { display:inline-block; padding:3px 10px; border-radius:999px; font-size:10px; font-weight:700; text-transform:uppercase; }
        .status-published { background:rgba(34,197,94,0.15); color:#4ade80; border:1px solid rgba(34,197,94,0.2); }
        .table-actions { display:flex; gap:6px; }
        .act-btn { padding:5px 10px; border-radius:5px; font-size:11px; font-weight:700; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-dim); transition:all .15s; }
        .act-btn:hover { background:var(--bg4); color:var(--text); }
        .act-btn.edit { color:var(--rust-light); border-color:rgba(201,77,58,0.3); }
        .act-btn.edit:hover { background:rgba(201,77,58,0.1); }
        #toast { position:fixed; bottom:24px; right:24px; z-index:999; transform:translateY(80px); opacity:0; transition:all .3s cubic-bezier(.34,1.56,.64,1); }
        #toast.show { transform:translateY(0); opacity:1; }
        .toast-inner { padding:14px 20px; border-radius:10px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:10px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
        .toast-success { background:#1a2e1a; border:1px solid rgba(34,197,94,0.3); color:#4ade80; }
        .toast-error { background:#2e1a1a; border:1px solid rgba(239,68,68,0.3); color:#f87171; }
        .toast-info { background:var(--bg3); border:1px solid var(--border); color:var(--text); }
        .spin { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-dimmer); }
        .empty-state p { font-size:15px; margin-bottom:8px; color:var(--text-dim); }
        .cat-politics { background:linear-gradient(135deg,#7f1d1d,#991b1b); }
        .cat-economy,.cat-global-economy { background:linear-gradient(135deg,#b45309,#d97706); }
        .cat-science { background:linear-gradient(135deg,#047857,#059669); }
        .cat-technology,.cat-tech { background:linear-gradient(135deg,#334155,#475569); }
        .cat-health { background:linear-gradient(135deg,#be185d,#db2777); }
        .cat-opinion { background:linear-gradient(135deg,#7c3aed,#5b21b6); }
        .cat-global-affairs { background:linear-gradient(135deg,#1e40af,#2563eb); }
        .cat-default { background:linear-gradient(135deg,#475569,#334155); }
        .tags-input-wrap { display:flex; flex-direction:column; gap:8px; }
        .tag-input-row { display:flex; align-items:center; gap:6px; position:relative; }
        .tag-prefix { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--rust-light); font-weight:700; line-height:1; padding-top:1px; flex-shrink:0; }
        .tag-input { flex:1; padding:8px 32px 8px 6px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; font-family:'JetBrains Mono',monospace; outline:none; transition:border-color .2s; }
        .tag-input:focus { border-color:var(--rust); }
        .tag-input::placeholder { color:var(--text-dimmer); font-family:'Lato',sans-serif; }
        .tag-edit-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-dimmer); font-size:12px; padding:0; line-height:1; transition:color .2s; }
        .tag-edit-btn:hover { color:var(--rust-light); }
        .tag-pill-row { display:flex; align-items:center; gap:6px; }
        .tag-pill { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; background:rgba(201,77,58,0.12); border:1px solid rgba(201,77,58,0.3); border-radius:999px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--rust-light); font-weight:500; }
        .tag-pill-edit { background:none; border:none; cursor:pointer; color:var(--text-dimmer); font-size:11px; padding:0; line-height:1; transition:color .2s; }
        .tag-pill-edit:hover { color:var(--rust-light); }
        /* VIDEO MODAL */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:500; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
        .modal-box { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:28px; width:100%; max-width:460px; box-shadow:0 24px 60px rgba(0,0,0,0.6); }
        .modal-box h3 { font-family:'Playfair Display',serif; font-size:18px; color:#fff; margin-bottom:6px; }
        .modal-box p { font-size:13px; color:var(--text-dim); margin-bottom:20px; line-height:1.5; }
        .modal-input { width:100%; padding:11px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; font-family:'JetBrains Mono',monospace; outline:none; transition:border-color .2s; }
        .modal-input:focus { border-color:var(--rust); }
        .modal-actions { display:flex; gap:10px; margin-top:20px; }
        .modal-confirm { flex:1; padding:11px; background:linear-gradient(135deg,var(--rust),var(--rust-dark)); border:none; border-radius:8px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; }
        .modal-confirm:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,77,58,0.35); }
        .modal-cancel { padding:11px 18px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-dim); font-size:14px; cursor:pointer; transition:all .2s; }
        .modal-cancel:hover { border-color:var(--rust); color:var(--rust-light); }
    </style>
</head>
<body>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="videoModal" style="display:none" onclick="if(event.target===this)closeVideoModal()">
    <div class="modal-box">
        <h3>🎬 Incorporar Vídeo</h3>
        <p>Cole o URL do YouTube, Vimeo ou outra plataforma de vídeo.</p>
        <input type="url" class="modal-input" id="videoUrlInput" placeholder="https://www.youtube.com/watch?v=...">
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeVideoModal()">Cancelar</button>
            <button class="modal-confirm" onclick="confirmVideoEmbed()">Inserir vídeo</button>
        </div>
    </div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-mark">D</div>
            <div class="login-logo-text">
                <h1>Duna Press</h1>
                <p>Painel Admin</p>
            </div>
        </div>
        <div class="login-tabs">
            <button class="login-tab active" id="tab-login" onclick="switchLoginTab('login')">Entrar</button>
            <button class="login-tab" id="tab-register" onclick="switchLoginTab('register')">Criar Conta</button>
        </div>
        <div id="form-login">
            <form onsubmit="handleLogin(event)">
                <div class="field"><label>E-mail</label><input type="email" id="loginEmail" placeholder="seu@email.com" required autocomplete="email"></div>
                <div class="field"><label>Senha</label><input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password"></div>
                <button type="submit" class="btn-primary" id="loginBtn">Entrar no Painel</button>
            </form>
        </div>
        <div id="form-register" style="display:none">
            <form onsubmit="handleRegister(event)">
                <div class="field"><label>Nome completo</label><input type="text" id="regName" placeholder="O seu nome" required></div>
                <div class="field"><label>E-mail</label><input type="email" id="regEmail" placeholder="seu@email.com" required></div>
                <div class="field"><label>Senha</label><input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6"></div>
                <button type="submit" class="btn-primary" id="regBtn">Criar conta</button>
            </form>
        </div>
        <div class="login-msg" id="loginMsg"></div>
    </div>
</div>

<!-- ADMIN SCREEN -->
<div id="adminScreen">
    <div class="admin-header">
        <div class="admin-header-left">
            <div class="admin-logo-mark">D</div>
            <span>Duna Press</span>
            <small id="userRole">Editorial</small>
        </div>
        <div class="admin-header-right">
            <div class="user-chip"><div class="user-dot"></div><span id="userEmail">—</span></div>
            <a href="https://app-algoritmo.github.io/dunapressjr/" target="_blank" style="padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;text-decoration:none;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-dim)'">Ver site ↗</a>
            <button class="btn-logout" onclick="handleLogout()">Sair</button>
        </div>
    </div>
    <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('editor')" id="tab-editor">✍️ Novo Artigo</button>
        <button class="tab-btn" onclick="switchTab('articles')" id="tab-articles">📋 Artigos Publicados</button>
    </div>

    <!-- EDITOR TAB -->
    <div id="panel-editor" class="admin-content">
        <div class="editor-layout">
            <div class="editor-main">

function simpleMarkdown(md) {
    md = md.replace(/\[video\]\((.+?)\)/g, (match, url) => {
        const embed = getVideoEmbedUrl(url);
        return embed ? `<div class="video-embed"><iframe src="${embed}" allowfullscreen></iframe></div>` : `<a href="${url}" style="color:#ea8e80">${url}</a>`;
    });
    return md
        .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/~~(.+?)~~/g,'<del>$1</del>')
        .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" style="color:#ea8e80">$1</a>').replace(/!\[(.+?)\]\((.+?)\)/g,'<img src="$2" alt="$1">')
        .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
        .replace(/^---$/gm,'<hr>').replace(/\n\n/g,'</p><p>');
}

function fmt(type) {
    const ta = document.getElementById('artContent');
    const start = ta.selectionStart, end = ta.selectionEnd, sel = ta.value.substring(start, end);
    let r = '';
    switch(type) {
        case 'bold':   r = `**${sel||'texto em negrito'}**`; break;
        case 'italic': r = `*${sel||'texto em itálico'}*`; break;
        case 'strike': r = `~~${sel||'texto riscado'}~~`; break;
        case 'h2':     r = `\n## ${sel||'Título da secção'}\n`; break;
        case 'h3':     r = `\n### ${sel||'Subtítulo'}\n`; break;
        case 'ul':     r = `\n- ${sel||'Primeiro item'}\n- Segundo item\n`; break;
        case 'ol':     r = `\n1. ${sel||'Primeiro item'}\n2. Segundo item\n`; break;
        case 'quote':  r = `\n> ${sel||'Citação aqui'}\n`; break;
        case 'hr':     r = `\n---\n`; break;
        case 'link':
            const url = prompt('URL do link:', 'https://');
            if (url) r = `[${sel||'texto do link'}](${url})`; else return;
            break;
    }
    ta.value = ta.value.substring(0, start) + r + ta.value.substring(end);
    ta.focus(); ta.selectionStart = ta.selectionEnd = start + r.length;
}

/* VIDEO EMBED */
function openVideoModal() {
    document.getElementById('videoUrlInput').value = '';

function closeVideoModal() { document.getElementById('videoModal').style.display = 'none'; }
function getVideoEmbedUrl(url) {
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
    if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
    const vi = url.match(/vimeo\.com\/(\d+)/);
    if (vi) return `https://player.vimeo.com/video/${vi[1]}`;
    if (url.includes('/embed/') || url.includes('player.vimeo')) return url;
    return null;
}
function confirmVideoEmbed() {
    const url = document.getElementById('videoUrlInput').value.trim();
    if (!url) { showToast('Insira um URL de vídeo válido.', 'error'); return; }
    const ta = document.getElementById('artContent'), pos = ta.selectionStart;
    const md = `\n[video](${url})\n`;
    ta.value = ta.value.substring(0, pos) + md + ta.value.substring(pos);
    ta.focus(); ta.selectionStart = ta.selectionEnd = pos + md.length;
    closeVideoModal(); showToast('🎬 Vídeo inserido no artigo', 'success');
}
document.addEventListener('keydown', e => {

async function uploadImage(input) {
    const file = input.files[0]; if (!file) return;
    showToast('⏳ A carregar imagem...', 'info');
    const token = await getToken();
    const reader = new FileReader();
    reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        const filename = `${Date.now()}-${file.name.replace(/\s/g,'-')}`;
        try {
            const res = await fetch(`${GH_API}/contents/imagens/${filename}`, { method:'PUT', headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'}, body:JSON.stringify({message:`Imagem: ${filename}`,content:base64,branch:'main'}) });
            if (!res.ok) throw new Error('Erro ao carregar');
            const imageUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/imagens/${filename}`;
            const ta = document.getElementById('artContent'), pos = ta.selectionStart;
            const md = `\n![${file.name}](${imageUrl})\n`;
            ta.value = ta.value.substring(0, pos) + md + ta.value.substring(pos);
            showToast('✅ Imagem inserida!', 'success');
        } catch(err) { showToast('❌ ' + err.message, 'error'); }
        input.value = '';
    };
    reader.readAsDataURL(file);
}

function slugify(text) {
    return text.toLowerCase().trim()
        .replace(/[áàãâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i').replace(/[óòõôö]/g,'o').replace(/[úùûü]/g,'u').replace(/[ç]/g,'c').replace(/[ñ]/g,'n')
        .replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
}

async function publishArticle() {
    const title = document.getElementById('artTitle').value.trim(), content = document.getElementById('artContent').value.trim();
    const date = document.getElementById('artDate').value, cat = document.getElementById('artCategory').value;
    const author = document.getElementById('artAuthor').value.trim() || 'Redação Duna Press';
    const slug = document.getElementById('artSlug').value.trim() || slugify(title);
    if (!title) { showToast('Adicione um título ao artigo.', 'error'); return; }
    if (!content) { showToast('Escreva o conteúdo do artigo.', 'error'); return; }
    localStorage.setItem('duna_author', author);
    const token = await getToken();
    if (!token) { showToast('Token GitHub não configurado.', 'error'); return; }
    const filepath = `artigos/${cat}/${date}-${slug}.md`;
    const tags = getTagsForFrontmatter();
    const tagsFm = tags.length ? `\ntags:\n${tags.map(t=>'  - '+t).join('\n')}` : '';
    const tagsMeta = tags.length ? `\nkeywords: "${tags.join(', ')}"` : '';
    const fm = `---\ntitle: "${title.replace(/"/g,"'")}"\ndate: ${date}\nstatus: ${articleStatus}\nauthor: ${author}\ncategories:\n  - ${cat}${tagsFm}${tagsMeta}\n---\n\n${content}`;
    const encoded = btoa(unescape(encodeURIComponent(fm)));
    document.getElementById('publishBtn').disabled = true;
    document.getElementById('publishLabel').style.display = 'none';
    document.getElementById('publishSpinner').style.display = 'inline-block';
    try {
        let sha = null;
        const chk = await fetch(`${GH_API}/contents/${filepath}`, { headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'} });
        if (chk.ok) sha = (await chk.json()).sha;
        const body = { message:`${articleStatus==='publish'?'Publica':'Rascunho'}: ${title}`, content:encoded, branch:'main' };
        if (sha) body.sha = sha;
        const res = await fetch(`${GH_API}/contents/${filepath}`, { method:'PUT', headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'}, body:JSON.stringify(body) });
        if (!res.ok) throw new Error((await res.json()).message || 'Erro ao publicar');
        showToast(`✅ Publicado em ${filepath}`, 'success');
        localStorage.removeItem('duna_draft');
        ['artTitle','artContent','artSlug'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('artDate').value = new Date().toISOString().split('T')[0];
        updateSlugPreview(); resetTags();
    } catch(e) { showToast(`❌ Erro: ${e.message}`, 'error'); }
    finally {
        document.getElementById('publishBtn').disabled = false;
        document.getElementById('publishLabel').style.display = 'inline';
        document.getElementById('publishSpinner').style.display = 'none';
    }
}

async function loadArticlesList() {
    const container = document.getElementById('articlesListContainer');
    container.innerHTML = `<div class="empty-state"><div class="spin" style="width:32px;height:32px;margin:0 auto 16px;border-width:3px;border-top-color:var(--rust)"></div><p>Carregando...</p></div>`;
    const token = await getToken();
    const headers = token ? {'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'} : {'Accept':'application/vnd.github+json'};
    try {
        const res = await fetch(`${GH_API}/contents/artigos`, { headers });
        if (!res.ok) throw new Error();
        const cats = (await res.json()).filter(i => i.type === 'dir');
        const results = await Promise.all(cats.slice(0,10).map(async cat => {
            try {
                const r = await fetch(cat.url, { headers });
                if (!r.ok) return [];
                return (await r.json()).filter(f => f.name.endsWith('.md')).map(f => ({ name:f.name, path:f.path, category:cat.name, sha:f.sha, date:(f.name.match(/^(\d{4}-\d{2}-\d{2})/)||[])[1]||'', title:f.name.replace(/^\d{4}-\d{2}-\d{2}-/,'').replace('.md','').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) }));
            } catch(e) { return []; }
        }));
        allLoadedArticles = results.flat().sort((a,b) => b.date.localeCompare(a.date));
        renderArticlesList(allLoadedArticles);
    } catch(e) { container.innerHTML = `<div class="empty-state"><p>Erro ao carregar artigos.</p></div>`; }
}

const catClassMap = { 'politics-and-society':'cat-politics','global-economy':'cat-economy','science':'cat-science','technology':'cat-technology','health':'cat-health','opinion':'cat-opinion','global-affairs':'cat-global-affairs' };
const catLabelMap = { 'politics-and-society':'Política','global-economy':'Economia','science':'Ciência','technology':'Tecnologia','health':'Saúde','opinion':'Opinião','global-affairs':'Global Affairs','international-relations':'Int. Relations','international-politics':'Int. Politics','history':'História','education':'Educação','environment':'Ambiente','geopolitics':'Geopolítica','culture-and-history':'Cultura & História' };

function renderArticlesList(articles) {
    const container = document.getElementById('articlesListContainer');
    if (!articles.length) { container.innerHTML = `<div class="empty-state"><p>Nenhum artigo encontrado.</p></div>`; return; }
    container.innerHTML = `<div class="articles-table"><div class="table-head"><div>Título</div><div>Categoria</div><div>Data</div><div>Status</div><div>Ações</div></div>${articles.map(art=>`<div class="table-row"><div class="table-row-title" title="${art.title}">${art.title}</div><div><span class="cat-pill ${catClassMap[art.category]||'cat-default'}">${catLabelMap[art.category]||art.category}</span></div><div class="table-row-date">${art.date||'—'}</div><div><span class="status-published">Publicado</span></div><div class="table-actions"><button class="act-btn" onclick="viewArticle('${art.path}')">Ver</button><button class="act-btn edit" onclick="editArticle('${art.path}','${art.sha}')">Editar</button></div></div>`).join('')}</div><div style="padding:12px 20px;font-size:12px;color:var(--text-dimmer);text-align:right;">${articles.length} artigos</div>`;
}

function filterArticlesList(q) { renderArticlesList(q ? allLoadedArticles.filter(a => a.title.toLowerCase().includes(q.toLowerCase())||a.category.toLowerCase().includes(q.toLowerCase())) : allLoadedArticles); }
function viewArticle(path) { window.open(`https://app-algoritmo.github.io/dunapressjr/artigo.html?file=/${path}`,'_blank'); }

async function editArticle(path, sha) {
    const token = await getToken(); showToast('Carregando artigo...','info');
    try {
        const res = await fetch(`${GH_API}/contents/${path}`, { headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json'} });
        const data = await res.json();
        const raw = decodeURIComponent(escape(atob(data.content)));
        const fm = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
        if (fm) {
            const block = fm[1], content = fm[2];
            const tM = block.match(/^title:\s*["']?(.*?)["']?\s*$/m), dM = block.match(/^date:\s*(.+)\s*$/m), aM = block.match(/^author:\s*(.+)\s*$/m), cM = block.match(/^  - (.+)\s*$/m);
            document.getElementById('artTitle').value   = tM ? tM[1].replace(/^["']|["']$/g,'') : '';
            document.getElementById('artContent').value = content.trim();
            document.getElementById('artDate').value    = dM ? dM[1].trim() : '';
            document.getElementById('artAuthor').value  = aM ? aM[1].trim() : '';
            if (cM) { const sel = document.getElementById('artCategory'); const opt = Array.from(sel.options).find(o=>o.value===cM[1].trim()); if(opt) sel.value=opt.value; }
        }
        document.getElementById('artSlug').value = path.split('/').pop().replace('.md','').replace(/^\d{4}-\d{2}-\d{2}-/,'');
        updateSlugPreview(); switchTab('editor'); showToast('✓ Artigo carregado para edição','success');
    } catch(e) { showToast(`Erro: ${e.message}`,'error'); }
}

let toastTimer;
function showToast(msg, type='info') {
    clearTimeout(toastTimer);
    const inner = document.getElementById('toastInner');
    inner.className = `toast-inner toast-${type}`; inner.textContent = msg;
    document.getElementById('toast').classList.add('show');
    toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 4000);
}

setInterval(() => { if (document.getElementById('artTitle')?.value || document.getElementById('artContent')?.value) saveAsDraft(); }, 30000);

/* TAGS SEO */
const tagValues = ['','',''];
function slugifyTag(text) { return text.toLowerCase().trim().replace(/[áàãâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i').replace(/[óòõôö]/g,'o').replace(/[úùûü]/g,'u').replace(/[ç]/g,'c').replace(/[ñ]/g,'n').replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
function handleTagInput(i) { const inp=document.getElementById('tagInput'+i),pos=inp.selectionStart; inp.value=inp.value.toLowerCase(); inp.setSelectionRange(pos,pos); }
function confirmTag(i) { const inp=document.getElementById('tagInput'+i),raw=inp.value.trim(); if(!raw){tagValues[i]='';renderTagPills();return;} const slug=slugifyTag(raw); tagValues[i]=slug; inp.value=slug; renderTagPills(); }
function tagKeydown(e,i) { if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();confirmTag(i);if(i<2)document.getElementById('tagInput'+(i+1)).focus();} }
function editTag(i) { const inp=document.getElementById('tagInput'+i); inp.removeAttribute('readonly'); inp.focus(); inp.select(); }
function renderTagPills() { const row=document.getElementById('tagPillRow'),active=tagValues.filter(t=>t.length>0); if(!active.length){row.innerHTML='';row.style.marginTop='0';return;} row.style.marginTop='4px'; row.innerHTML=active.map(t=>`<span class="tag-pill">#${t}<button class="tag-pill-edit" onclick="editTagByValue('${t}')" title="Editar">✏️</button></span>`).join(''); }
function editTagByValue(val) { const i=tagValues.indexOf(val); if(i>=0)editTag(i); }
function getTagsForFrontmatter() { return tagValues.filter(t=>t.length>0); }
function resetTags() { tagValues.fill(''); for(let i=0;i<3;i++) document.getElementById('tagInput'+i).value=''; renderTagPills(); }
</script>
