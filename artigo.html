    <script>
        // Relógio e Data em PT-BR
        function updateClock() {
            const t = new Date();
            const pad = n => String(n).padStart(2,'0');
            const el = document.getElementById('liveClock');
            if (el) el.textContent = pad(t.getHours())+':'+pad(t.getMinutes())+':'+pad(t.getSeconds());
        }
        updateClock(); setInterval(updateClock, 1000);
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

        // Configuração do Repositório
        const REPO_OWNER = 'app-algoritmo';
        const REPO_NAME = 'dunapressjr';
        const BRANCH = 'main'; 

        // Mapeamento de Categorias para Badges (PT-BR)
        const categoryColors = {
            'noticias': 'badge-noticias',
            'política': 'badge-politica',
            'politica': 'badge-politica',
            'economia': 'badge-economia',
            'ciência': 'badge-ciencia',
            'ciencia': 'badge-ciencia',
            'tecnologia': 'badge-tecnologia',
            'saúde': 'badge-saude',
            'saude': 'badge-saude',
            'educação': 'badge-educacao',
            'educacao': 'badge-educacao'
        };

        async function loadArticles() {
            try {
                // Busca a lista de arquivos na pasta /artigos/ via API do GitHub
                const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/artigos`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Falha ao carregar artigos');
                
                const contents = await response.json();
                
                // Filtra apenas pastas (categorias)
                const categories = contents.filter(item => item.type === 'dir');
                
                let allArticles = [];

                // Para cada categoria, busca os arquivos .md dentro dela
                for (const cat of categories) {
                    const catApiUrl = `${cat.url}`; 
                    try {
                        const catRes = await fetch(catApiUrl);
                        const files = await catRes.json();
                        
                        // Filtra apenas arquivos .md
                        const mdFiles = files.filter(f => f.name.endsWith('.md'));
                        
                        mdFiles.forEach(file => {
                            const parts = file.path.split('/');
                            const category = parts[1]; 
                            const slug = file.name.replace('.md', '');
                            
                            // Formata o título a partir do slug (ex: eleicoes-2026 -> Eleicoes 2026)
                            const titleFormatted = slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                            
                            allArticles.push({
                                title: titleFormatted,
                                category: category,
                                url: `/artigos/${category}/${slug}`,
                                date: new Date().toLocaleDateString('pt-BR'),
                                excerpt: 'Clique para ler a análise completa deste assunto global...'
                            });
                        });
                    } catch (e) {
                        console.error(`Erro ao ler categoria ${cat.name}`, e);
                    }
                }

                // Ordena por data (simulada) e pega os 9 mais recentes
                renderArticles(allArticles.slice(0, 9)); 

            } catch (error) {
                console.error(error);
                document.getElementById('articlesGrid').innerHTML = `
                    <div class="col-span-full text-center text-slate-400 py-10">
                        <p>Não foi possível carregar os artigos automaticamente.</p>
                        <p class="text-xs mt-2">Verifique se o repositório é público e se a estrutura /artigos/ existe.</p>
                    </div>
                `;
            }
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articlesGrid');
            grid.innerHTML = '';

            if (articles.length === 0) {
                grid.innerHTML = '<p class="text-slate-400 col-span-full text-center">Nenhum artigo encontrado ainda.</p>';
                return;
            }

            articles.forEach(article => {
                const badgeClass = categoryColors[article.category.toLowerCase()] || 'badge-default';
                
                const card = `
                    <a href="${article.url}" class="block bg-slate-900/50 border border-slate-800 rounded-xl p-6 card-hover group h-full flex flex-col">
                        <div class="mb-3">
                            <span class="badge ${badgeClass}">${article.category}</span>
                        </div>
                        <h3 class="text-xl font-serif font-bold text-white mb-2 group-hover:text-duna-400 transition line-clamp-2">
                            ${article.title}
                        </h3>
                        <p class="text-slate-400 text-sm mb-4 line-clamp-3 flex-grow">
                            ${article.excerpt}
                        </p>
                        <div class="flex items-center justify-between mt-auto pt-4 border-t border-slate-800">
                            <span class="text-xs text-slate-500">${article.date}</span>
                            <span class="text-xs text-duna-400 font-semibold flex items-center gap-1">
                                Ler mais 
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            </span>
                        </div>
                    </a>
                `;
                grid.innerHTML += card;
            });
        }

        // Inicia o carregamento
        loadArticles();
    </script>
